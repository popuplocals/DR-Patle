<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FAF9F6"/>
  <rect x="0" y="0" width="400" height="180" fill="#F0F5F4"/>
  <rect x="0" y="252" width="400" height="48" fill="#E0E8E6"/>
  <!-- wall clock -->
  <circle cx="60" cy="56" r="20" fill="#FFFFFF" stroke="#0F2C2A" stroke-width="3"/>
  <line x1="60" y1="56" x2="60" y2="44" stroke="#0D9488" stroke-width="2.5"/>
  <line x1="60" y1="56" x2="69" y2="60" stroke="#0F2C2A" stroke-width="2.5"/>
  <!-- signage -->
  <rect x="140" y="36" width="120" height="30" rx="15" fill="#CCFBF1"/>
  <text x="200" y="56" text-anchor="middle" font-family="Verdana, sans-serif" font-size="12" font-weight="bold" fill="#115E59">RECEPTION</text>
  <!-- desk -->
  <rect x="120" y="140" width="160" height="20" rx="4" fill="#0D9488"/>
  <rect x="128" y="160" width="144" height="92" fill="#FFFFFF" stroke="#0F2C2A" stroke-width="3"/>
  <!-- computer -->
  <rect x="176" y="106" width="48" height="32" rx="4" fill="#0F2C2A"/>
  <rect x="181" y="111" width="38" height="22" rx="2" fill="#5EEAD4"/>
  <rect x="194" y="138" width="12" height="6" fill="#0F2C2A"/>
  <!-- waiting chairs -->
  <g stroke="#0F2C2A" stroke-width="3" fill="#14B8A6">
    <rect x="26" y="186" width="52" height="12" rx="4"/>
    <rect x="26" y="152" width="10" height="46" rx="3"/>
    <rect x="26" y="198" width="8" height="54"/>
    <rect x="70" y="198" width="8" height="54"/>
  </g>
  <g stroke="#0F2C2A" stroke-width="3" fill="#14B8A6">
    <rect x="316" y="186" width="52" height="12" rx="4"/>
    <rect x="358" y="152" width="10" height="46" rx="3"/>
    <rect x="316" y="198" width="8" height="54"/>
    <rect x="360" y="198" width="8" height="54"/>
  </g>
  <!-- plant -->
  <circle cx="302" cy="176" r="16" fill="#99F6E4"/>
  <circle cx="290" cy="188" r="11" fill="#5EEAD4"/>
  <rect x="288" y="192" width="24" height="22" rx="4" fill="#115E59"/>
</svg>
