<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FAF9F6"/>
  <rect x="0" y="0" width="400" height="170" fill="#F0F5F4"/>
  <rect x="0" y="250" width="400" height="50" fill="#E0E8E6"/>
  <!-- parallel bars -->
  <g stroke="#0D9488" stroke-width="6" stroke-linecap="round">
    <line x1="60" y1="150" x2="240" y2="150"/>
  </g>
  <g stroke="#0F2C2A" stroke-width="5" stroke-linecap="round">
    <line x1="70" y1="150" x2="70" y2="250"/>
    <line x1="130" y1="150" x2="130" y2="250"/>
    <line x1="170" y1="150" x2="170" y2="250"/>
    <line x1="230" y1="150" x2="230" y2="250"/>
  </g>
  <!-- exercise ball -->
  <circle cx="300" cy="216" r="34" fill="#14B8A6" stroke="#0F2C2A" stroke-width="3"/>
  <path d="M 272 204 q 28 -14 56 0" stroke="#0F2C2A" stroke-width="2.5" fill="none"/>
  <!-- mat -->
  <rect x="66" y="252" width="150" height="10" rx="5" fill="#5EEAD4" stroke="#0F2C2A" stroke-width="2.5"/>
  <!-- dumbbell rack -->
  <rect x="344" y="146" width="44" height="10" rx="3" fill="#0F2C2A"/>
  <rect x="344" y="176" width="44" height="10" rx="3" fill="#0F2C2A"/>
  <g fill="#0D9488" stroke="#0F2C2A" stroke-width="2">
    <rect x="348" y="136" width="8" height="12" rx="2"/>
    <rect x="362" y="136" width="8" height="12" rx="2"/>
    <rect x="376" y="136" width="8" height="12" rx="2"/>
    <rect x="348" y="166" width="8" height="12" rx="2"/>
    <rect x="362" y="166" width="8" height="12" rx="2"/>
    <rect x="376" y="166" width="8" height="12" rx="2"/>
  </g>
  <!-- wall poster -->
  <rect x="60" y="40" width="70" height="52" rx="4" fill="#FFFFFF" stroke="#0F2C2A" stroke-width="3"/>
  <g stroke="#0D9488" stroke-width="3" fill="none" stroke-linecap="round">
    <circle cx="82" cy="56" r="6"/>
    <line x1="82" y1="62" x2="82" y2="76"/>
    <line x1="82" y1="66" x2="94" y2="58"/>
    <line x1="82" y1="76" x2="92" y2="84"/>
    <line x1="82" y1="76" x2="74" y2="84"/>
  </g>
</svg>
